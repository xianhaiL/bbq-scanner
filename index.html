<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="烧烤点菜">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23d97706'/><text x='50' y='68' font-size='60' text-anchor='middle'>🍖</text></svg>">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23d97706'/><text x='50' y='68' font-size='60' text-anchor='middle'>🍖</text></svg>">
<title>烧烤点菜扫描</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --amber: #f59e0b;
  --amber-dark: #d97706;
  --red: #ef4444;
  --green: #22c55e;
  --gray-50: #fafafa;
  --gray-100: #f5f5f4;
  --gray-200: #e7e5e4;
  --gray-400: #a8a29e;
  --gray-600: #57534e;
  --gray-800: #292524;
  --radius: 12px;
  --safe-bottom: env(safe-area-inset-bottom, 16px);
}
html, body { height: 100%; overflow: hidden; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: #1c1917;
  color: var(--gray-800);
  display: flex; justify-content: center; align-items: center;
}
.app {
  width: 100%; max-width: 480px; height: 100%;
  background: var(--gray-50);
  display: flex; flex-direction: column;
  position: relative; overflow: hidden;
}

/* Header */
.header {
  background: linear-gradient(135deg, #d97706, #f59e0b);
  color: #fff; padding: 16px 20px;
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0; box-shadow: 0 2px 8px rgba(0,0,0,.15);
}
.header h1 { font-size: 20px; font-weight: 700; letter-spacing: 1px; }
.header-btn {
  background: rgba(255,255,255,.2); border: none; color: #fff;
  width: 36px; height: 36px; border-radius: 50%;
  font-size: 18px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}
.header-btn:active { background: rgba(255,255,255,.4); }

.main { flex: 1; overflow-y: auto; padding: 16px; -webkit-overflow-scrolling: touch; }

/* Bottom Tabs */
.tab-bar {
  display: flex; background: #fff; border-top: 1px solid var(--gray-200);
  flex-shrink: 0; padding-bottom: var(--safe-bottom);
}
.tab-item {
  flex: 1; text-align: center; padding: 10px 0 6px;
  cursor: pointer; color: var(--gray-400); font-size: 11px;
  transition: color .2s;
}
.tab-item.active { color: var(--amber-dark); font-weight: 600; }
.tab-item .tab-icon { font-size: 22px; display: block; margin-bottom: 2px; }

/* Table grid */
.table-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
.table-card {
  background: #fff; border-radius: var(--radius); padding: 20px 16px;
  text-align: center; box-shadow: 0 1px 3px rgba(0,0,0,.08);
  cursor: pointer; position: relative; border: 2px solid transparent;
  transition: border-color .2s;
}
.table-card:active { border-color: var(--amber); }
.table-card .table-num { font-size: 32px; font-weight: 800; color: var(--amber-dark); line-height: 1; }
.table-card .table-label { font-size: 12px; color: var(--gray-400); margin-top: 4px; }
.table-card .table-count {
  margin-top: 8px; font-size: 13px; color: var(--gray-600);
  background: var(--gray-100); border-radius: 20px; padding: 4px 12px; display: inline-block;
}
.table-delete {
  position: absolute; top: 8px; right: 8px;
  width: 24px; height: 24px; border-radius: 50%;
  background: var(--red); color: #fff; border: none;
  font-size: 14px; line-height: 1;
  display: flex; align-items: center; justify-content: center;
  opacity: 0; transition: opacity .2s; cursor: pointer;
}
.table-card:active .table-delete { opacity: 1; }

/* Dish library */
.dish-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
.dish-card {
  background: #fff; border-radius: var(--radius); overflow: hidden;
  box-shadow: 0 1px 3px rgba(0,0,0,.08); cursor: pointer; position: relative;
  border: 2px solid transparent; transition: border-color .2s;
}
.dish-card:active { border-color: var(--amber); }
.dish-card .dish-img {
  width: 100%; height: 110px; object-fit: cover; background: var(--gray-100);
}
.dish-card .dish-img-placeholder {
  width: 100%; height: 110px; background: var(--gray-100);
  display: flex; align-items: center; justify-content: center;
  font-size: 40px; color: var(--gray-400);
}
.dish-card .dish-info { padding: 10px; }
.dish-card .dish-name { font-size: 15px; font-weight: 600; }
.dish-card .dish-price { font-size: 13px; color: var(--amber-dark); font-weight: 700; margin-top: 2px; }
.dish-card .dish-delete {
  position: absolute; top: 4px; right: 4px;
  width: 22px; height: 22px; border-radius: 50%;
  background: var(--red); color: #fff; border: none; font-size: 12px;
  cursor: pointer; opacity: 0; transition: opacity .2s;
  display: flex; align-items: center; justify-content: center;
}
.dish-card:active .dish-delete { opacity: 1; }

/* Empty state */
.empty-state {
  text-align: center; padding: 60px 20px; color: var(--gray-400);
}
.empty-state .icon { font-size: 56px; display: block; margin-bottom: 12px; }
.empty-state p { font-size: 14px; }

/* FAB */
.fab {
  position: sticky; bottom: 8px; display: block; width: 100%;
  background: var(--amber); color: #fff; border: none;
  border-radius: var(--radius); padding: 16px;
  font-size: 16px; font-weight: 700; cursor: pointer;
  margin-top: 16px; box-shadow: 0 4px 12px rgba(245,158,11,.4);
}
.fab:active { background: var(--amber-dark); }
.fab-outline {
  background: #fff; color: var(--amber-dark); border: 2px solid var(--amber);
  box-shadow: 0 2px 8px rgba(245,158,11,.2);
}
.fab-outline:active { background: #fffbeb; }

/* Detail header */
.detail-header {
  display: flex; align-items: center; gap: 12px; padding: 16px 20px;
  background: #fff; border-bottom: 1px solid var(--gray-200); flex-shrink: 0;
}
.back-btn {
  background: none; border: none; font-size: 24px; cursor: pointer;
  color: var(--gray-800); padding: 4px; line-height: 1;
}
.detail-table-num { font-size: 22px; font-weight: 800; color: var(--amber-dark); flex: 1; }
.detail-actions { display: flex; gap: 8px; }
.detail-actions button {
  padding: 6px 12px; border-radius: 20px; border: 1px solid var(--gray-200);
  background: #fff; font-size: 13px; cursor: pointer; color: var(--gray-600);
}
.detail-actions button:active { background: var(--gray-100); }
.detail-actions .clear-btn { color: var(--red); border-color: var(--red); }

/* Item list */
.item-list { list-style: none; padding: 8px 0; }
.item {
  display: flex; align-items: center; padding: 14px 20px;
  background: #fff; border-bottom: 1px solid var(--gray-100); gap: 12px;
}
.item:last-child { border-bottom: none; }
.item-name { flex: 1; font-size: 16px; font-weight: 500; }
.item-info { flex: 1; min-width: 0; }
.item-price { font-size: 12px; color: var(--gray-400); margin-top: 2px; }
.item-subtotal { font-size: 13px; color: var(--amber-dark); font-weight: 600; min-width: 50px; text-align: right; }
.item-qty {
  display: flex; align-items: center; gap: 8px;
  background: var(--gray-100); border-radius: 20px; padding: 4px;
}
.item-qty button {
  width: 30px; height: 30px; border-radius: 50%; border: none;
  background: #fff; font-size: 16px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: var(--gray-800); box-shadow: 0 1px 2px rgba(0,0,0,.1);
}
.item-qty button:active { background: var(--gray-200); }
.item-qty span { font-size: 15px; font-weight: 600; min-width: 22px; text-align: center; }
.item-del {
  background: none; border: none; color: var(--red); font-size: 18px;
  cursor: pointer; padding: 4px 8px;
}

/* Settings */
.settings-section {
  background: #fff; border-radius: var(--radius); padding: 20px;
  box-shadow: 0 1px 3px rgba(0,0,0,.08); margin-bottom: 16px;
}
.settings-section h3 { font-size: 16px; margin-bottom: 12px; }
.settings-section label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; color: var(--gray-600); }
.settings-section input {
  width: 100%; padding: 12px; border: 2px solid var(--gray-200);
  border-radius: 8px; font-size: 14px; outline: none;
  transition: border-color .2s;
}
.settings-section input:focus { border-color: var(--amber); }
.settings-section .hint { font-size: 12px; color: var(--gray-400); margin-top: 6px; }
.settings-section .hint a { color: var(--amber-dark); }

/* Modal */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.5);
  display: flex; align-items: flex-end; justify-content: center;
  z-index: 100; animation: fadeIn .2s;
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.modal {
  background: #fff; border-radius: 16px 16px 0 0; width: 100%;
  max-width: 480px; padding: 24px 20px; animation: slideUp .25s;
  max-height: 85vh; overflow-y: auto;
}
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
.modal h3 { font-size: 18px; margin-bottom: 16px; }
.modal input {
  width: 100%; padding: 12px; border: 2px solid var(--gray-200);
  border-radius: 8px; font-size: 16px; outline: none; margin-bottom: 12px;
}
.modal input:focus { border-color: var(--amber); }
.modal-btns { display: flex; gap: 12px; margin-top: 8px; }
.modal-btns button {
  flex: 1; padding: 14px; border-radius: var(--radius);
  border: none; font-size: 16px; font-weight: 600; cursor: pointer;
}
.modal-btns .cancel { background: var(--gray-100); color: var(--gray-600); }
.modal-btns .confirm { background: var(--amber); color: #fff; }

/* Loading overlay */
.loading-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.6);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  z-index: 200;
}
.spinner {
  width: 48px; height: 48px; border: 4px solid rgba(255,255,255,.3);
  border-top-color: #fff; border-radius: 50%;
  animation: spin .8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { color: #fff; margin-top: 16px; font-size: 15px; }

/* Toast */
.toast {
  position: fixed; top: 20%; left: 50%; transform: translateX(-50%);
  background: var(--gray-800); color: #fff; padding: 12px 24px;
  border-radius: 20px; font-size: 14px; z-index: 300; pointer-events: none;
  animation: toastIn .3s;
}
@keyframes toastIn { from { opacity: 0; transform: translateX(-50%) translateY(-10px); } }

/* Views */
.view { display: none; flex-direction: column; height: 100%; }
.view.active { display: flex; }

/* manual add */
.manual-add {
  display: flex; gap: 8px; padding: 12px 20px;
  background: #fff; border-bottom: 1px solid var(--gray-100);
}
.manual-add input {
  padding: 10px; border: 2px solid var(--gray-200);
  border-radius: 8px; font-size: 14px; outline: none;
}
.manual-add input[name="dishname"] { flex: 1; }
.manual-add input[name="dishqty"] { max-width: 70px; }
.manual-add input:focus { border-color: var(--amber); }
.manual-add .add-btn {
  padding: 10px 16px; background: var(--amber); color: #fff;
  border: none; border-radius: 8px; font-weight: 600; cursor: pointer; white-space: nowrap;
}

/* Camera buttons */
.camera-btns {
  display: flex; gap: 12px; padding: 12px 20px;
}
.camera-btns button {
  flex: 1; padding: 14px; border-radius: var(--radius);
  border: 2px solid var(--amber); background: #fff;
  color: var(--amber-dark); font-size: 15px; font-weight: 600;
  cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px;
}
.camera-btns button:active { background: #fffbeb; }
.camera-btns .primary-btn {
  background: var(--amber); color: #fff; border-color: var(--amber);
}
.camera-btns .primary-btn:active { background: var(--amber-dark); }

.summary-bar {
  padding: 12px 20px; background: #fffbeb;
  border-top: 2px solid var(--amber); flex-shrink: 0;
  display: flex; justify-content: space-between;
  font-size: 14px; color: var(--gray-600);
}
.summary-bar strong { color: var(--amber-dark); font-size: 16px; }

/* Library count badge */
.badge {
  display: inline-block; background: var(--amber); color: #fff;
  font-size: 11px; padding: 1px 7px; border-radius: 10px; margin-left: 4px;
  vertical-align: middle;
}

/* Dish photo in add modal */
.dish-photo-area {
  width: 100%; height: 180px; border: 2px dashed var(--gray-200);
  border-radius: var(--radius); margin-bottom: 12px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; overflow: hidden; background: var(--gray-50);
  transition: border-color .2s;
}
.dish-photo-area:active { border-color: var(--amber); }
.dish-photo-area img {
  width: 100%; height: 100%; object-fit: cover;
}
.dish-photo-area .placeholder {
  text-align: center; color: var(--gray-400);
}
.dish-photo-area .placeholder .ph-icon { font-size: 42px; display: block; }
.dish-photo-area .placeholder .ph-text { font-size: 13px; margin-top: 6px; }

/* Confirm modal cards */
.confirm-card {
  display: flex; align-items: center; gap: 12px;
  padding: 14px; background: var(--gray-50); border-radius: var(--radius);
  margin-bottom: 10px;
}
.confirm-card-img {
  width: 56px; height: 56px; border-radius: 10px; object-fit: cover;
  background: var(--gray-200); flex-shrink: 0;
}
.confirm-card-info { flex: 1; min-width: 0; }
.confirm-card-name { font-size: 16px; font-weight: 600; }
.confirm-card-price { font-size: 12px; color: var(--gray-400); }
.confirm-card-qty {
  display: flex; align-items: center; gap: 0;
  flex-shrink: 0;
}
.confirm-card-qty button {
  width: 40px; height: 40px; border: none;
  font-size: 22px; font-weight: 700; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: #fff;
}
.confirm-card-qty .qty-minus { background: var(--gray-400); border-radius: 10px 0 0 10px; }
.confirm-card-qty .qty-plus { background: var(--amber); border-radius: 0 10px 10px 0; }
.confirm-card-qty .qty-minus:active { background: var(--gray-600); }
.confirm-card-qty .qty-plus:active { background: var(--amber-dark); }
.confirm-card-qty .qty-val {
  width: 44px; height: 40px; background: #fff;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; font-weight: 800; color: var(--gray-800);
  border-top: 2px solid var(--gray-200); border-bottom: 2px solid var(--gray-200);
}
.confirm-card-subtotal {
  font-size: 15px; font-weight: 700; color: var(--amber-dark);
  min-width: 55px; text-align: right; flex-shrink: 0;
}
.confirm-card-del {
  background: none; border: none; color: var(--red); font-size: 16px;
  cursor: pointer; padding: 4px; flex-shrink: 0;
}

.confirm-total {
  display: flex; justify-content: space-between; align-items: center;
  padding: 12px 0; font-size: 18px; font-weight: 800;
  border-top: 2px solid var(--gray-200); margin-top: 8px;
}
.confirm-total-price { color: var(--red); font-size: 22px; }

/* Voice button */
.voice-btn {
  width: 100%; padding: 16px; border-radius: var(--radius);
  border: 2px solid var(--amber); background: #fff;
  color: var(--amber-dark); font-size: 16px; font-weight: 700;
  cursor: pointer; display: flex; align-items: center;
  justify-content: center; gap: 8px;
  margin-bottom: 12px;
}
.voice-btn:active { background: #fffbeb; }
.voice-btn.listening {
  background: var(--red); color: #fff; border-color: var(--red);
  animation: pulse 1.5s infinite;
}
@keyframes pulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(239,68,68,.5); }
  50% { box-shadow: 0 0 0 12px rgba(239,68,68,0); }
}
.voice-hint {
  text-align: center; font-size: 12px; color: var(--gray-400);
  padding-bottom: 12px;
}
</style>
</head>
<body>

<div class="app" id="app">

  <!-- ========== 桌台列表视图 ========== -->
  <div class="view active" id="view-tables">
    <div class="header">
      <h1>🍖 烧烤点菜扫描</h1>
      <div style="display:flex;gap:8px">
        <span style="font-size:12px;color:rgba(255,255,255,.7);line-height:36px" id="lib-count-header"></span>
      </div>
    </div>
    <div class="main" id="tables-main"></div>
    <button class="fab" onclick="showAddTableModal()">+ 添加桌台</button>
    <div class="tab-bar">
      <div class="tab-item active" onclick="switchTab('tables')">
        <span class="tab-icon">🪑</span>桌台
      </div>
      <div class="tab-item" onclick="switchTab('library')">
        <span class="tab-icon">📚</span>菜品库
      </div>
      <div class="tab-item" onclick="switchTab('settings')">
        <span class="tab-icon">⚙</span>设置
      </div>
    </div>
  </div>

  <!-- ========== 菜品库视图 ========== -->
  <div class="view" id="view-library">
    <div class="header">
      <h1>📚 菜品库</h1>
      <span style="font-size:13px;color:rgba(255,255,255,.7)" id="lib-dish-count"></span>
    </div>
    <div class="main" id="library-main"></div>
    <button class="fab" onclick="showAddDishModal()">+ 添加菜品</button>
    <div class="tab-bar">
      <div class="tab-item" onclick="switchTab('tables')">
        <span class="tab-icon">🪑</span>桌台
      </div>
      <div class="tab-item active" onclick="switchTab('library')">
        <span class="tab-icon">📚</span>菜品库
      </div>
      <div class="tab-item" onclick="switchTab('settings')">
        <span class="tab-icon">⚙</span>设置
      </div>
    </div>
  </div>

  <!-- ========== 设置视图 ========== -->
  <div class="view" id="view-settings">
    <div class="header">
      <h1>⚙ 设置</h1>
      <span style="width:36px"></span>
    </div>
    <div class="main">
      <div class="settings-section">
        <h3>七牛云 AI API</h3>
        <label>API Key</label>
        <input type="password" id="api-key-input" placeholder="sk-xxxxxxxx">
        <p class="hint">当前模型：doubao-1.5-vision-pro。在 <a href="https://portal.qiniu.com/ai-inference/api-key" target="_blank">七牛云 AI 推理</a> 申请，新用户送 1000 万 Token。</p>
      </div>
      <button class="fab" onclick="saveSettings()" style="position:static;margin-top:8px">保存设置</button>
      <button class="fab fab-outline" onclick="downloadApp()" style="position:static;margin-top:12px">💾 保存到手机</button>
      <p style="text-align:center;margin-top:12px;font-size:12px;color:var(--gray-400)" id="settings-status"></p>
    </div>
    <div class="tab-bar">
      <div class="tab-item" onclick="switchTab('tables')">
        <span class="tab-icon">🪑</span>桌台
      </div>
      <div class="tab-item" onclick="switchTab('library')">
        <span class="tab-icon">📚</span>菜品库
      </div>
      <div class="tab-item active" onclick="switchTab('settings')">
        <span class="tab-icon">⚙</span>设置
      </div>
    </div>
  </div>

  <!-- ========== 桌台详情视图 ========== -->
  <div class="view" id="view-detail">
    <div class="detail-header">
      <button class="back-btn" onclick="goBackToTables()">←</button>
      <span class="detail-table-num" id="detail-table-num"></span>
      <div class="detail-actions">
        <button onclick="toggleManualAdd()">✏ 手动加菜</button>
        <button class="clear-btn" onclick="clearCurrentTable()">清空</button>
      </div>
    </div>
    <div class="manual-add" id="manual-add" style="display:none">
      <input type="text" name="dishname" id="manual-dish-name" placeholder="菜名" onkeydown="if(event.key==='Enter')addManualDish()" oninput="autoFillPrice()">
      <input type="number" name="dishqty" id="manual-dish-qty" placeholder="数量" value="1" min="1" onkeydown="if(event.key==='Enter')addManualDish()">
      <input type="number" name="dishprice" id="manual-dish-price" placeholder="单价" step="0.1" min="0" style="max-width:80px" onkeydown="if(event.key==='Enter')addManualDish()">
      <button class="add-btn" onclick="addManualDish()">添加</button>
    </div>
    <div class="main" id="detail-main"></div>
    <button class="voice-btn" id="voice-btn" onclick="startVoice()">🎤 语音录入</button>
    <p class="voice-hint" id="voice-hint">点「语音录入」开始录音，说完全部菜品后再点一下停止</p>
    <div class="camera-btns" id="camera-btns">
      <button onclick="document.getElementById('gallery-input').click()">🖼 相册</button>
      <button class="primary-btn" onclick="document.getElementById('camera-input').click()">📷 拍照识别</button>
      <input type="file" id="camera-input" accept="image/*" capture="environment" onchange="handleScanImage(event)" hidden>
      <input type="file" id="gallery-input" accept="image/*" onchange="handleScanImage(event)" hidden>
    </div>
    <div class="summary-bar" id="summary-bar" style="display:none">
      <span id="summary-text"></span>
      <span style="font-size:18px;font-weight:800;color:var(--red)" id="summary-total"></span>
    </div>
  </div>

  <!-- ========== 添加桌台弹窗 ========== -->
  <div class="modal-overlay" id="table-modal" style="display:none" onclick="if(event.target===this)hideModal('table-modal')">
    <div class="modal">
      <h3>添加桌台</h3>
      <input type="number" id="new-table-num" placeholder="输入桌号，如 1、2、3..." min="1" onkeydown="if(event.key==='Enter')addTable()">
      <div class="modal-btns">

    <div class="modal">

      <input type="file" id="dish-photo-input" accept="image/*" capture="environment" onchange="handleDishPhoto(event)" hidden>
      <input type="text" id="new-dish-name" placeholder="输入菜品名称" onkeydown="if(event.key==='Enter')document.getElementById('new-dish-price').focus()">
      <input type="number" id="new-dish-price" placeholder="单价（元）" step="0.1" min="0" onkeydown="if(event.key==='Enter')addDish()">
      <div class="modal-btns">
        <button class="cancel" onclick="hideModal('dish-modal')">取消</button>

  <!-- ========== 识别确认弹窗 ========== -->

    <div class="modal" style="max-height:80vh;padding-bottom:16px">

      <div id="confirm-list"></div>
      <div class="confirm-total">
        <span>合计</span>
        <span class="confirm-total-price" id="confirm-total-price"></span>
      </div>
      <div class="modal-btns">
        <button class="cancel" onclick="hideModal('confirm-modal')">取消</button>
        <button class="confirm" onclick="confirmDishes()">确认录入</button>
      </div>
    </div>
  </div>

  <!-- Loading -->
  <div class="loading-overlay" id="loading" style="display:none">
    <div class="spinner"></div>
    <p class="loading-text">AI 正在对照菜品库识别...</p>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast" style="display:none"></div>

</div>

<script>
// ==================== Storage ====================
const LS_TABLES = 'bbq_tables_v2';
const LS_LIBRARY = 'bbq_library';
const LS_API_KEY = 'bbq_api_key';

function loadTables() {
  try { return JSON.parse(localStorage.getItem(LS_TABLES) || '{}'); } catch { return {}; }
}
function saveTables(t) { localStorage.setItem(LS_TABLES, JSON.stringify(t)); }

function loadLibrary() {
  try { return JSON.parse(localStorage.getItem(LS_LIBRARY) || '[]'); } catch { return []; }
}
function saveLibrary(l) {
  try { localStorage.setItem(LS_LIBRARY, JSON.stringify(l)); }
  catch (e) { showToast('存储空间不足，请删除一些菜品图片后重试', 3000); throw e; }
}

function loadApiKey() { return localStorage.getItem(LS_API_KEY) || ''; }
function saveApiKey(k) { localStorage.setItem(LS_API_KEY, k); }

// ==================== State ====================
let currentTable = null;
let dishPhotoBase64 = null;
let pendingDishes = [];

// ==================== Toast ====================
function showToast(msg, duration = 2000) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', duration);
}

// ==================== Loading ====================
function showLoading(msg) {
  document.querySelector('.loading-text').textContent = msg || 'AI 正在对照菜品库识别...';
  document.getElementById('loading').style.display = 'flex';
}
function hideLoading() { document.getElementById('loading').style.display = 'none'; }

// ==================== Tab Switching ====================
function switchTab(tab) {
  const views = {
    tables: 'view-tables',
    library: 'view-library',
    settings: 'view-settings'
  };
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById(views[tab]).classList.add('active');

  // Update tab bar active states
  document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
  const tabs = document.querySelectorAll('.tab-item');
  const idx = { tables: 0, library: 1, settings: 2 };
  // Find all tab bars and update
  document.querySelectorAll('.tab-bar').forEach(bar => {
    bar.querySelectorAll('.tab-item').forEach((item, i) => {
      item.classList.toggle('active', i === idx[tab]);
    });
  });

  if (tab === 'tables') { currentTable = null; renderTables(); }
  if (tab === 'library') renderLibrary();
  if (tab === 'settings') {
    document.getElementById('api-key-input').value = loadApiKey();
    document.getElementById('settings-status').textContent = '';
  }
  updateHeaderBadge();
}

function updateHeaderBadge() {
  const lib = loadLibrary();
  document.getElementById('lib-count-header').textContent = lib.length ? '菜品库 ' + lib.length + ' 种' : '';
  document.getElementById('lib-dish-count').textContent = lib.length ? '共 ' + lib.length + ' 种菜品' : '暂无菜品';
}

// ==================== Tables ====================
function renderTables() {
  const tables = loadTables();
  const main = document.getElementById('tables-main');
  const nums = Object.keys(tables).sort((a, b) => Number(a) - Number(b));

  if (nums.length === 0) {
    main.innerHTML = `<div class="empty-state"><span class="icon">🪑</span><p>还没有桌台，点击下方添加</p></div>`;
    return;
  }

  main.innerHTML = `<div class="table-grid">${nums.map(n => {
    const t = tables[n];
    const count = (t.items || []).reduce((s, i) => s + i.quantity, 0);
    const totalPrice = (t.items || []).reduce((s, i) => {
      const p = i.price || getDishPrice(i.name);
      return s + p * i.quantity;
    }, 0);
    return `<div class="table-card" onclick="openTable('${n}')">
      <button class="table-delete" onclick="event.stopPropagation();deleteTable('${n}')">×</button>
      <div class="table-num">${n}</div>
      <div class="table-label">号桌</div>
      <div class="table-count">${count > 0 ? count + ' 道菜 · ¥' + totalPrice.toFixed(1) : '暂无菜品'}</div>
    </div>`;
  }).join('')}</div>`;
}

function showAddTableModal() {
  document.getElementById('table-modal').style.display = 'flex';
  document.getElementById('new-table-num').value = '';
  setTimeout(() => document.getElementById('new-table-num').focus(), 100);
}

function addTable() {
  const input = document.getElementById('new-table-num');
  const num = input.value.trim();
  if (!num) { showToast('请输入桌号'); return; }
  const tables = loadTables();
  if (tables[num]) { showToast('该桌台已存在'); return; }
  tables[num] = { number: num, items: [], createdAt: new Date().toISOString() };
  saveTables(tables);
  hideModal('table-modal');
  renderTables();
  showToast(num + ' 号桌已添加');
}

function deleteTable(num) {
  if (!confirm('确定删除 ' + num + ' 号桌？所有点菜数据将丢失。')) return;
  const tables = loadTables();
  delete tables[num];
  saveTables(tables);
  renderTables();
  showToast(num + ' 号桌已删除');
}

// ==================== Dish Library ====================
function renderLibrary() {
  const lib = loadLibrary();
  const main = document.getElementById('library-main');

  if (lib.length === 0) {
    main.innerHTML = `<div class="empty-state"><span class="icon">📚</span><p>菜品库为空<br>先给每道菜拍一张参考照</p></div>`;
    return;
  }

  main.innerHTML = `<div class="dish-grid">${lib.map((d, idx) => `
    <div class="dish-card">
      <button class="dish-delete" onclick="event.stopPropagation();deleteDish(${idx})">×</button>
      ${d.photo ? `<img class="dish-img" src="${d.photo}" alt="${escHtml(d.name)}">`
        : `<div class="dish-img-placeholder">🍖</div>`}
      <div class="dish-info"><div class="dish-name">${escHtml(d.name)}</div>
      <div class="dish-price">¥${(d.price || 0).toFixed(1)}</div></div>
    </div>
  `).join('')}</div>`;

  updateHeaderBadge();
}

function showAddDishModal() {
  document.getElementById('dish-modal').style.display = 'flex';
  document.getElementById('new-dish-name').value = '';
  document.getElementById('new-dish-price').value = '';
  document.getElementById('dish-photo-preview').style.display = 'none';
  document.getElementById('dish-photo-placeholder').style.display = 'block';
  dishPhotoBase64 = null;
  document.getElementById('dish-photo-input').value = '';
  setTimeout(() => document.getElementById('new-dish-name').focus(), 100);
}

function compressImage(file, maxW, quality, callback) {
  const reader = new FileReader();
  reader.onload = function(e) {
    const img = new Image();
    img.onload = function() {
      const canvas = document.createElement('canvas');
      let w = img.width, h = img.height;
      if (w > maxW) { h = h * maxW / w; w = maxW; }
      canvas.width = w; canvas.height = h;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, w, h);
      callback(canvas.toDataURL('image/jpeg', quality));
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function handleDishPhoto(event) {
  const file = event.target.files[0];
  if (!file) return;
  showLoading('压缩图片中...');
  compressImage(file, 300, 0.7, function(compressed) {
    dishPhotoBase64 = compressed;
    const preview = document.getElementById('dish-photo-preview');
    preview.src = dishPhotoBase64;
    preview.style.display = 'block';
    document.getElementById('dish-photo-placeholder').style.display = 'none';
    hideLoading();
  });
}

function addDish() {
  const name = document.getElementById('new-dish-name').value.trim();
  const price = parseFloat(document.getElementById('new-dish-price').value) || 0;
  if (!name) { showToast('请输入菜品名称'); return; }
  if (price <= 0) { showToast('请输入有效价格'); return; }
  const lib = loadLibrary();
  if (lib.some(d => d.name === name)) { showToast('该菜品已存在'); return; }
  lib.push({ id: Date.now().toString(), name, price, photo: dishPhotoBase64 || '' });
  saveLibrary(lib);
  hideModal('dish-modal');
  renderLibrary();
  updateHeaderBadge();
  showToast('「' + name + '」已加入菜品库 ¥' + price.toFixed(1));
}

function deleteDish(idx) {
  const lib = loadLibrary();
  const name = lib[idx].name;
  if (!confirm('确定从菜品库删除「' + name + '」？')) return;
  lib.splice(idx, 1);
  saveLibrary(lib);
  renderLibrary();
  updateHeaderBadge();
  showToast('已删除「' + name + '」');
}

// ==================== Table Detail ====================
function openTable(num) {
  const lib = loadLibrary();
  if (lib.length === 0) {
    showToast('请先在菜品库中添加菜品');
    switchTab('library');
    return;
  }
  currentTable = num;
  document.getElementById('detail-table-num').textContent = num + ' 号桌';
  document.getElementById('manual-add').style.display = 'none';
  switchView('view-detail');
  renderDetail();
  document.getElementById('camera-input').value = '';
  document.getElementById('gallery-input').value = '';
}

function switchView(viewId) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById(viewId).classList.add('active');
}

function goBackToTables() {
  currentTable = null;
  document.getElementById('manual-add').style.display = 'none';
  switchTab('tables');
}

function getDishPrice(name) {
  const lib = loadLibrary();
  const dish = lib.find(d => d.name === name);
  return dish ? (dish.price || 0) : 0;
}

function renderDetail() {
  if (!currentTable) return;
  const tables = loadTables();
  const t = tables[currentTable];
  if (!t) { goBackToTables(); return; }
  const items = t.items || [];
  const main = document.getElementById('detail-main');

  if (items.length === 0) {
    main.innerHTML = `<div class="empty-state"><span class="icon">📋</span><p>暂无菜品，拍照后 AI 会对照菜品库识别</p></div>`;
    document.getElementById('summary-bar').style.display = 'none';
    return;
  }

  main.innerHTML = `<ul class="item-list">${items.map((item, idx) => {
    const price = item.price || getDishPrice(item.name);
    const subtotal = price * item.quantity;
    return `
    <li class="item">
      <div class="item-info">
        <span class="item-name">${escHtml(item.name)}</span>
        <span class="item-price">¥${price.toFixed(1)}/份</span>
      </div>
      <div class="item-qty">
        <button onclick="changeQty(${idx}, -1)">−</button>
        <span>${item.quantity}</span>
        <button onclick="changeQty(${idx}, 1)">+</button>
      </div>
      <span class="item-subtotal">¥${subtotal.toFixed(1)}</span>
      <button class="item-del" onclick="removeItem(${idx})">×</button>
    </li>`;
  }).join('')}</ul>`;

  const totalQty = items.reduce((s, i) => s + i.quantity, 0);
  const totalPrice = items.reduce((s, i) => {
    const p = i.price || getDishPrice(i.name);
    return s + p * i.quantity;
  }, 0);
  document.getElementById('summary-bar').style.display = 'flex';
  document.getElementById('summary-text').innerHTML = `共 <strong>${items.length}</strong> 种 <strong>${totalQty}</strong> 份`;
  document.getElementById('summary-total').textContent = '¥' + totalPrice.toFixed(1);
}

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function toggleManualAdd() {
  const el = document.getElementById('manual-add');
  el.style.display = el.style.display === 'none' ? 'flex' : 'none';
  if (el.style.display === 'flex') document.getElementById('manual-dish-name').focus();
}

function autoFillPrice() {
  const name = document.getElementById('manual-dish-name').value.trim();
  const price = getDishPrice(name);
  if (price > 0) {
    document.getElementById('manual-dish-price').value = price;
  }
}

function addManualDish() {
  const nameEl = document.getElementById('manual-dish-name');
  const qtyEl = document.getElementById('manual-dish-qty');
  const priceEl = document.getElementById('manual-dish-price');
  const name = nameEl.value.trim();
  const qty = parseInt(qtyEl.value) || 1;
  const price = parseFloat(priceEl.value) || getDishPrice(name) || 0;
  if (!name) { showToast('请输入菜名'); return; }
  const tables = loadTables();
  if (!tables[currentTable]) return;
  const items = tables[currentTable].items || [];
  const existing = items.find(i => i.name === name);
  if (existing) { existing.quantity += qty; }
  else { items.push({ id: Date.now().toString(), name, quantity: qty, price }); }
  tables[currentTable].items = items;
  saveTables(tables);
  renderDetail();
  nameEl.value = ''; qtyEl.value = '1'; priceEl.value = '';
}

function changeQty(idx, delta) {
  const tables = loadTables();
  if (!tables[currentTable]) return;
  const items = tables[currentTable].items;
  if (!items[idx]) return;
  items[idx].quantity += delta;
  if (items[idx].quantity <= 0) items.splice(idx, 1);
  saveTables(tables);
  renderDetail();
}

function removeItem(idx) {
  const tables = loadTables();
  if (!tables[currentTable]) return;
  tables[currentTable].items.splice(idx, 1);
  saveTables(tables);
  renderDetail();
}

function clearCurrentTable() {
  if (!confirm('确定清空 ' + currentTable + ' 号桌的所有菜品？')) return;
  const tables = loadTables();
  if (!tables[currentTable]) return;
  tables[currentTable].items = [];
  saveTables(tables);
  renderDetail();
  showToast('已清空');
}

function hideModal(id) { document.getElementById(id).style.display = 'none'; }

// ==================== Scan & Recognition ====================
function handleScanImage(event) {
  const file = event.target.files[0];
  if (!file) return;
  const apiKey = loadApiKey();
  if (!apiKey) { showToast('请先在设置中填写 API Key'); switchTab('settings'); return; }
  if (!currentTable) { showToast('请先选择桌台'); goBackToTables(); return; }

  showLoading('压缩图片中...');
  compressImage(file, 1024, 0.85, function(compressed) {
    showLoading('AI 正在比对参考图识别...');
    recognizeDishes(compressed, apiKey);
  });
}

async function recognizeDishes(scanBase64, apiKey) {
  const lib = loadLibrary();
  if (lib.length === 0) { hideLoading(); showToast('请先添加菜品到菜品库'); return; }

  try {
    const userContent = [];

    for (const dish of lib) {
      if (dish.photo) {
        userContent.push({ type: 'image_url', image_url: { url: dish.photo } });
        userContent.push({ type: 'text', text: '【' + dish.name + '】' });
      }
    }

    userContent.push({ type: 'image_url', image_url: { url: scanBase64 } });
    userContent.push({ type: 'text', text: '对照参考图，识别照片中的菜品和数量，输出JSON' });

    const resp = await fetch('https://api.qnaigc.com/v1/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + apiKey },
      body: JSON.stringify({
        model: 'doubao-1.5-vision-pro',
        messages: [
          {
            role: 'system',
            content: `烧烤店菜品识别。参考图标注了菜名，对照识别实拍照片中有哪些菜品。只需识别种类，quantity 永远填 1。JSON：
{"dishes": [{"name": "菜名", "quantity": 1}]}
name与参考图一致，同种只出现一次，没看到不输出，不认识忽略。`
          },
          { role: 'user', content: userContent }
        ],
        response_format: { type: 'json_object' }
      })
    });

    if (!resp.ok) {
      const err = await resp.text();
      hideLoading();
      console.error('API Error:', resp.status, err);
      if (resp.status === 401 || resp.status === 403) showToast('API Key 无效');
      else if (resp.status === 429) showToast('请求太频繁，稍后重试');
      else showToast('识别失败: ' + resp.status);
      return;
    }

    const data = await resp.json();
    hideLoading();

    const content = data.choices?.[0]?.message?.content;
    if (!content) { showToast('AI 未返回结果，请重试'); return; }

    let result;
    try {
      const cleaned = content.replace(/```json\s?/g, '').replace(/```\s?/g, '').trim();
      result = JSON.parse(cleaned);
    } catch {
      const match = content.match(/\{[\s\S]*\}/);
      if (match) { try { result = JSON.parse(match[0]); } catch {} }
      if (!result) { console.error('Parse error:', content); showToast('格式异常，请重试'); return; }
    }

    const dishes = result.dishes || [];
    if (dishes.length === 0) { showToast('未识别到菜品，换清晰照片重试'); return; }

    // Show confirmation modal instead of auto-merging
    showConfirmModal(dishes);
  } catch (e) {
    hideLoading();
    console.error('Recognition error:', e);
    showToast('网络错误，请检查网络后重试');
  }
}

// ==================== Voice Input (Baidu ASR) ====================
const BAIDU_API_KEY = 'lW7VKke7CoZJDWaF5cpNffub';
const BAIDU_SECRET = 'PO9u2A9D7Jwiftwo09HH391eW8XOUSux';
let audioCtx = null, mediaStream = null, audioChunks = [];
let isRecording = false;

async function getBaiduToken() {
  const cached = localStorage.getItem('baidu_token_expire');
  if (cached && Date.now() < parseInt(cached)) {
    return localStorage.getItem('baidu_token');
  }
  const resp = await fetch('https://aip.baidubce.com/oauth/2.0/token?grant_type=client_credentials&client_id=' + BAIDU_API_KEY + '&client_secret=' + BAIDU_SECRET, { method: 'POST' });
  const data = await resp.json();
  if (data.access_token) {
    localStorage.setItem('baidu_token', data.access_token);
    localStorage.setItem('baidu_token_expire', Date.now() + (data.expires_in - 3600) * 1000);
    return data.access_token;
  }
  throw new Error('Token fetch failed');
}

async function startVoice() {
  if (isRecording) { stopVoice(); return; }

  const btn = document.getElementById('voice-btn');
  const hint = document.getElementById('voice-hint');

  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    mediaStream = stream;
    audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
    const source = audioCtx.createMediaStreamSource(stream);
    const processor = audioCtx.createScriptProcessor(4096, 1, 1);
    audioChunks = [];

    source.connect(processor);
    processor.connect(audioCtx.destination);
    processor.onaudioprocess = function(e) {
      if (!isRecording) return;
      audioChunks.push(new Float32Array(e.inputBuffer.getChannelData(0)));
    };

    isRecording = true;
    btn.classList.add('listening');
    btn.textContent = '🔴 录音中，说完全部菜品后点停止';
    hint.textContent = '一次性报所有菜品，说完点按钮停止';
  } catch (e) {
    showToast('请允许麦克风权限后重试');
  }
}

function stopVoice() {
  isRecording = false;
  const btn = document.getElementById('voice-btn');
  const hint = document.getElementById('voice-hint');
  btn.classList.remove('listening');
  btn.textContent = '⏳ 识别中...';

  // Disconnect audio
  if (mediaStream) { mediaStream.getTracks().forEach(t => t.stop()); mediaStream = null; }
  if (audioCtx) { audioCtx.close(); audioCtx = null; }

  if (audioChunks.length === 0) {
    btn.textContent = '🎤 语音录入';
    hint.textContent = '说"菜品名+数量"，如"羊肉串5个、牛肉3串"';
    showToast('未录到声音，请重试');
    return;
  }

  // Convert to WAV
  const totalLen = audioChunks.reduce((s, c) => s + c.length, 0);
  const wav = new ArrayBuffer(44 + totalLen * 2);
  const view = new DataView(wav);
  // WAV header
  writeString(view, 0, 'RIFF'); view.setUint32(4, 36 + totalLen * 2, true);
  writeString(view, 8, 'WAVE'); writeString(view, 12, 'fmt ');
  view.setUint32(16, 16, true); view.setUint16(20, 1, true);
  view.setUint16(22, 1, true); view.setUint32(24, 16000, true);
  view.setUint32(28, 32000, true); view.setUint16(32, 2, true);
  view.setUint16(34, 16, true); writeString(view, 36, 'data');
  view.setUint32(40, totalLen * 2, true);
  let offset = 44;
  for (const chunk of audioChunks) {
    for (let i = 0; i < chunk.length; i++) {
      const s = Math.max(-1, Math.min(1, chunk[i]));
      view.setInt16(offset, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
      offset += 2;
    }
  }

  // Base64 encode and send to Baidu
  const base64 = btoa(String.fromCharCode.apply(null, new Uint8Array(wav)));
  sendToBaidu(base64, totalLen / 16000, btn, hint);
}

function writeString(view, offset, str) {
  for (let i = 0; i < str.length; i++) view.setUint8(offset + i, str.charCodeAt(i));
}

async function sendToBaidu(base64, duration, btn, hint) {
  try {
    const token = await getBaiduToken();
    const resp = await fetch('https://vop.baidu.com/server_api', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        format: 'wav', rate: 16000, channel: 1, cuid: 'bbq-app',
        token: token, speech: base64, len: base64.length
      })
    });
    const data = await resp.json();
    btn.textContent = '🎤 语音录入';
    hint.textContent = '说"菜品名+数量"，如"羊肉串5个、牛肉3串"';
    if (data.err_no === 0 && data.result && data.result.length > 0) {
      parseVoiceText(data.result[0]);
    } else {
      showToast('未识别到语音，请大声说清楚后重试');
    }
  } catch (e) {
    btn.textContent = '🎤 语音录入';
    hint.textContent = '说"菜品名+数量"，如"羊肉串5个、牛肉3串"';
    showToast('识别失败，请检查网络后重试');
  }
}

function chineseNumToDigit(str) {
  const map = { '零':0,'一':1,'二':2,'两':2,'三':3,'四':4,'五':5,'六':6,'七':7,'八':8,'九':9,'十':10 };
  // Handle "十二" (12), "二十" (20), "二十三" (23), "三十五" (35)
  return str.replace(/[零一二两三四五六七八九十]+/g, (match) => {
    if (match === '十') return '10';
    if (match.length === 1) return String(map[match] ?? match);
    // "十二" → 12, "二十" → 20, "二十三" → 23, "三十五" → 35
    let result = 0;
    if (match.startsWith('十')) result = 10 + (map[match[1]] || 0);  // 十二→12
    else if (match.endsWith('十')) result = (map[match[0]] || 0) * 10;  // 二十→20
    else if (match.includes('十')) {
      const parts = match.split('十');
      result = (map[parts[0]] || 0) * 10 + (map[parts[1]] || 0);  // 二十三→23
    }
    return String(result || match);
  });
}

function parseVoiceText(text) {
  const lib = loadLibrary();
  if (lib.length === 0) { showToast('请先添加菜品到菜品库'); return; }

  // Display raw text for debugging
  console.log('Voice raw:', text);

  // Convert Chinese numerals to digits: "羊肉三串" → "羊肉3串"
  const normalized = chineseNumToDigit(text);
  console.log('Voice normalized:', normalized);

  // Insert separator at quantity boundaries: "羊肉3串牛肉2串" → "羊肉3串,牛肉2串"
  const withSep = normalized.replace(/(\d+\s*[个串份盘只根]?)([^\d,，、\s。；;])/g, '$1,$2');
  // Split by common separators
  const segments = withSep.split(/[,，、\s。；;]+/).filter(s => s.trim());
  const found = [];

  for (const seg of segments) {
    let name = null, qty = 1;

    // "羊肉串5个" "羊肉串5串" "羊肉串5" "羊肉5"
    let m = seg.match(/^(.+?)(\d+)\s*(个|串|份|盘|只|根)?$/);
    if (m) { name = m[1]; qty = parseInt(m[2]); }
    else {
      // "5个羊肉串" "5串羊肉"
      m = seg.match(/^(\d+)\s*(个|串|份|盘|只|根)?(.+)$/);
      if (m) { qty = parseInt(m[1]); name = m[3]; }
      else {
        name = seg;
        qty = 1;
      }
    }

    if (!name) continue;
    name = name.trim();
    // Strip trailing units from name: "羊肉串" after "羊肉串5个" is fine, but "羊肉个" is not
    name = name.replace(/[个串份盘只根]+$/, '');

    // Fuzzy match against library
    let bestMatch = null;
    bestMatch = lib.find(d => d.name === name);
    if (!bestMatch) bestMatch = lib.find(d => d.name.includes(name) || name.includes(d.name));
    if (!bestMatch && name.length >= 2) {
      bestMatch = lib.find(d => {
        const shorter = d.name.length < name.length ? d.name : name;
        return shorter.length >= 2 && (d.name.includes(shorter) || shorter.includes(d.name.substring(0,2)));
      });
    }

    if (bestMatch) {
      const existing = found.find(f => f.name === bestMatch.name);
      if (existing) { existing.quantity += qty; }
      else { found.push({ name: bestMatch.name, quantity: qty, price: bestMatch.price || 0 }); }
    }
  }

  if (found.length === 0) {
    showToast('未匹配到菜品，请说清楚菜名。听到的是：' + text, 4000);
    return;
  }

  showConfirmModal(found);
}

// ==================== Confirm Modal ====================
function findDishPhoto(name) {
  const lib = loadLibrary();
  const d = lib.find(d => d.name === name);
  return d && d.photo ? d.photo : '';
}

function showConfirmModal(dishes) {
  // Use provided qty or default to 1
  pendingDishes = dishes.filter(d => d.name).map(d => ({
    name: d.name,
    quantity: d.quantity || 1,
    price: d.price || getDishPrice(d.name)
  }));

  const list = document.getElementById('confirm-list');
  const title = document.getElementById('confirm-title');
  title.textContent = '识别到 ' + pendingDishes.length + ' 种菜品，调数量后确认';

  list.innerHTML = pendingDishes.map((d, i) => {
    const photo = findDishPhoto(d.name);
    const imgHtml = photo
      ? `<img class="confirm-card-img" src="${photo}" alt="">`
      : `<div class="confirm-card-img" style="display:flex;align-items:center;justify-content:center;font-size:28px">🍖</div>`;
    return `
    <div class="confirm-card" id="confirm-card-${i}">
      ${imgHtml}
      <div class="confirm-card-info">
        <div class="confirm-card-name">${escHtml(d.name)}</div>
        <div class="confirm-card-price">¥${d.price.toFixed(1)}/份</div>
      </div>
      <div class="confirm-card-qty">
        <button class="qty-minus" onclick="adjConfirmQty(${i}, -1)">−</button>
        <div class="qty-val">${d.quantity}</div>
        <button class="qty-plus" onclick="adjConfirmQty(${i}, 1)">+</button>
      </div>
      <span class="confirm-card-subtotal" id="confirm-sub-${i}">¥${d.price.toFixed(1)}</span>
      <button class="confirm-card-del" onclick="delConfirmDish(${i})">×</button>
    </div>`;
  }).join('');

  updateConfirmTotal();
  document.getElementById('confirm-modal').style.display = 'flex';
}

function adjConfirmQty(idx, delta) {
  pendingDishes[idx].quantity += delta;
  if (pendingDishes[idx].quantity < 1) pendingDishes[idx].quantity = 1;
  if (pendingDishes[idx].quantity > 99) pendingDishes[idx].quantity = 99;

  const card = document.getElementById('confirm-card-' + idx);
  card.querySelector('.qty-val').textContent = pendingDishes[idx].quantity;
  const subtotal = pendingDishes[idx].price * pendingDishes[idx].quantity;
  document.getElementById('confirm-sub-' + idx).textContent = '¥' + subtotal.toFixed(1);
  updateConfirmTotal();
}

function delConfirmDish(idx) {
  pendingDishes.splice(idx, 1);
  if (pendingDishes.length === 0) {
    hideModal('confirm-modal');
    showToast('已全部移除');
    return;
  }
  // Rebuild the list
  document.getElementById('confirm-list').innerHTML = pendingDishes.map((d, i) => {
    const photo = findDishPhoto(d.name);
    const imgHtml = photo
      ? `<img class="confirm-card-img" src="${photo}" alt="">`
      : `<div class="confirm-card-img" style="display:flex;align-items:center;justify-content:center;font-size:28px">🍖</div>`;
    return `
    <div class="confirm-card" id="confirm-card-${i}">
      ${imgHtml}
      <div class="confirm-card-info">
        <div class="confirm-card-name">${escHtml(d.name)}</div>
        <div class="confirm-card-price">¥${d.price.toFixed(1)}/份</div>
      </div>
      <div class="confirm-card-qty">
        <button class="qty-minus" onclick="adjConfirmQty(${i}, -1)">−</button>
        <div class="qty-val">${d.quantity}</div>
        <button class="qty-plus" onclick="adjConfirmQty(${i}, 1)">+</button>
      </div>
      <span class="confirm-card-subtotal" id="confirm-sub-${i}">¥${(d.price * d.quantity).toFixed(1)}</span>
      <button class="confirm-card-del" onclick="delConfirmDish(${i})">×</button>
    </div>`;
  }).join('');
  updateConfirmTotal();
}

function updateConfirmTotal() {
  const total = pendingDishes.reduce((s, d) => s + d.price * d.quantity, 0);
  document.getElementById('confirm-total-price').textContent = '¥' + total.toFixed(1);
}

function confirmDishes() {
  if (pendingDishes.length === 0) return;
  const tables = loadTables();
  if (!tables[currentTable]) return;
  let items = tables[currentTable].items || [];

  for (const d of pendingDishes) {
    const existing = items.find(i => i.name === d.name);
    if (existing) { existing.quantity += d.quantity; }
    else { items.push({ id: Date.now().toString() + Math.random(), name: d.name, quantity: d.quantity, price: d.price }); }
  }

  tables[currentTable].items = items;
  saveTables(tables);
  hideModal('confirm-modal');
  renderDetail();
  showToast('已录入 ' + pendingDishes.length + ' 种菜品');
  pendingDishes = [];
}

// ==================== Settings ====================
function saveSettings() {
  const key = document.getElementById('api-key-input').value.trim();
  if (!key) { showToast('请输入 API Key'); return; }
  saveApiKey(key);
  document.getElementById('settings-status').textContent = '已保存 ✓';
  setTimeout(() => switchTab('tables'), 800);
}

async function downloadApp() {
  try {
    // Fetch the original source file from server for a clean copy
    const resp = await fetch(window.location.href);
    const html = await resp.text();
    const blob = new Blob([html], { type: 'text/html' });
    const url = URL.createObjectURL(blob);

    const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
    if (isIOS) {
      const win = window.open(url, '_blank');
      if (win) {
        showToast('点底部「分享」→「存储到文件」', 4000);
      } else {
        window.location.href = url;
      }
      setTimeout(() => URL.revokeObjectURL(url), 10000);
      return;
    }

    const a = document.createElement('a');
    a.href = url;
    a.download = 'bbq-scanner.html';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    showToast('已保存到下载目录', 3000);
  } catch (e) {
    showToast('保存失败，请截图此页面备用', 3000);
  }
}

renderTables();
